# chatwoot-power-tools — sequences engine sidecar.
# Loaded ALONGSIDE Chatwoot's own compose:
#   docker compose -f docker-compose.yml -f docker-compose.addons.yml up -d
# (a separate -f file, NOT docker-compose.override.yml, so it never clobbers a
#  user's existing override). All values come from the Chatwoot .env via CWPT_*
# keys that install.sh writes — nothing private is hardcoded here.
services:
  cwpt-engine:
    build:
      # docker compose resolves a RELATIVE build context against the project directory
      # (Chatwoot's compose dir), NOT against this -f file's location. install.sh copies
      # us under <compose_dir>/chatwoot-power-tools/, so it writes an absolute
      # CWPT_BUILD_CONTEXT into the Chatwoot .env pointing at the copied modules/sequences.
      # The ./modules/sequences default is for running from the repo root (dev/CI).
      context: ${CWPT_BUILD_CONTEXT:-./modules/sequences}
      dockerfile: engine/Dockerfile
    container_name: cwpt-engine
    restart: unless-stopped
    # Liveness: restart:unless-stopped covers crashes, but a HUNG process (event-loop stuck,
    # DB pool deadlock) stays "Up" forever without this. The public /drip-api/health route
    # answers before the auth gate; wget ships in the node:alpine base image. The autoheal
    # label opts the engine into willfarrell/autoheal restarts on Chatwoot stacks that run
    # it (both target servers do); harmless where no autoheal container exists.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/drip-api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - autoheal=true
    # No `depends_on: postgres`: install.sh always adds the engine to an ALREADY-RUNNING
    # Chatwoot (postgres is up before this runs), so start-ordering is moot — while a
    # hardcoded service name "postgres" would break stacks whose DB service is named
    # differently or is external/managed. restart: unless-stopped handles the (in-practice
    # nonexistent) cold-start race: if the DB isn't reachable yet the engine exits and is
    # restarted until it is.
    environment:
      # Least-privilege DB role connection string (install.sh -> lib/db.sh writes it).
      DATABASE_URL: ${CWPT_DATABASE_URL}
      # Chatwoot rails service, reachable on the compose default network.
      # Overridable when the detected rails service name differs.
      CHATWOOT_BASE_URL: ${CWPT_CHATWOOT_BASE_URL:-http://rails:3000}
      # Public origin for WhatsApp template media URLs — MUST be absolute, else
      # Meta cannot fetch media. install.sh derives it from FRONTEND_URL.
      PUBLIC_BASE_URL: ${CWPT_PUBLIC_BASE_URL}
      PORT: "3100"
      RECONCILE_INTERVAL: "60000"
      MEDIA_DIR: /app/media
      # Shared secret with the Chatwoot-side jbuilder (deploy/chatwoot-sso-jbuilder) that signs a
      # single-use sign-in ticket into the mobile app's dashboard-app URL — the only way the mobile
      # WebView (empty cookie jar) reaches the panel without a second login. Empty = feature off;
      # never defaulted (a guessable value would let anyone mint a ticket into any account).
      DRIP_SSO_SECRET: ${DRIP_SSO_SECRET:-}
      # Optional: POST {text} here the moment Meta resolves a NEW lead's first message, and the
      # operator gets a WhatsApp ping (delivered / blocked). The path is the shared secret —
      # anyone holding this URL can push a notification. Unset = alerts off.
      NOTIFY_WEBHOOK_URL: ${CWPT_NOTIFY_WEBHOOK_URL:-}
    volumes:
      - cwpt_media:/app/media
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M

volumes:
  cwpt_media:
